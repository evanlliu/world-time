<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4ff" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-title" content="世界时钟" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>世界时钟</title>

  <script>
    (function () {
      var language = (navigator.languages && navigator.languages.length ? navigator.languages[0] : navigator.language || "zh-CN").toLowerCase();
      var storedLanguage = "";
      try {
        storedLanguage = localStorage.getItem("worldClockLanguage") || "";
      } catch (error) {}

      var isChinese = language.indexOf("zh") === 0;
      var isTurkish = language.indexOf("tr") === 0;
      var detectedLanguageKey = isChinese ? "zh" : (isTurkish ? "tr" : "en");
      var languageKey = /^(zh|en|tr)$/.test(storedLanguage) ? storedLanguage : detectedLanguageKey;
      var titleMap = { zh: "世界时钟", en: "World Clock", tr: "Dünya Saati" };
      var htmlLangMap = { zh: "zh-CN", en: "en", tr: "tr" };
      var title = titleMap[languageKey];

      window.__WORLD_CLOCK_DEFAULT_LANG__ = languageKey;
      document.documentElement.lang = htmlLangMap[languageKey];
      document.title = title;

      var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if (appleTitle) {
        appleTitle.setAttribute("content", title);
      }

      var manifestMap = { zh: "./manifest.webmanifest", en: "./manifest-en.webmanifest", tr: "./manifest-tr.webmanifest" };
      var manifest = document.createElement("link");
      manifest.id = "dynamicManifest";
      manifest.rel = "manifest";
      manifest.href = manifestMap[languageKey];
      document.head.appendChild(manifest);
    })();
  </script>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" href="./icon-192.png" />

  <style>
    :root {

      --page-grad-3: #fbf6ff;
      --page-glow-a: rgba(85, 197, 255, .32);
      --page-glow-b: rgba(138, 125, 255, .26);
      --page-glow-c: rgba(255, 171, 77, .22);
      --page-glow-d: rgba(65, 217, 169, .22);
      --page-overlay-top: rgba(255,255,255,.00);
      --page-overlay-bottom: rgba(15, 23, 42, .03);
      --page-grid-opacity: .28;
      --panel: rgba(255, 255, 255, .68);
      --panel-strong: rgba(255, 255, 255, .82);
      --panel-soft: rgba(255, 255, 255, .46);
      --line: rgba(15, 23, 42, .08);
      --line-strong: rgba(15, 23, 42, .14);
      --text: #111827;
      --muted: rgba(17, 24, 39, .66);
      --soft: rgba(17, 24, 39, .46);
      --shadow-lg: 0 24px 70px rgba(45, 63, 112, .16);
      --shadow-md: 0 14px 34px rgba(45, 63, 112, .12);
      --blur: blur(24px) saturate(180%);
      --radius-2xl: 32px;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --blue: #4f7cff;
      --cyan: #55c5ff;
      --mint: #41d9a9;
      --orange: #ffab4d;
      --pink: #ff8db4;
      --violet: #8a7dff;
      --navy: #0f172a;
    }

    @supports (height: 100dvh) {
      :root { --app-height: 100dvh; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1: #07111f;
        --bg-2: #0e1830;
        --bg-3: #161024;
        --page-grad-1: #07111f;
        --page-grad-2: #0e1830;
        --page-grad-3: #161024;
        --page-glow-a: rgba(85, 197, 255, .18);
        --page-glow-b: rgba(138, 125, 255, .16);
        --page-glow-c: rgba(255, 171, 77, .10);
        --page-glow-d: rgba(65, 217, 169, .10);
        --page-overlay-top: rgba(3, 8, 18, .06);
        --page-overlay-bottom: rgba(2, 6, 16, .24);
        --page-grid-opacity: .16;
        --panel: rgba(11, 18, 34, .58);
        --panel-strong: rgba(14, 24, 48, .82);
        --panel-soft: rgba(255, 255, 255, .08);
        --line: rgba(255, 255, 255, .09);
        --line-strong: rgba(255, 255, 255, .15);
        --text: rgba(255, 255, 255, .95);
        --muted: rgba(255, 255, 255, .68);
        --soft: rgba(255, 255, 255, .44);
        --shadow-lg: 0 28px 75px rgba(0, 0, 0, .34);
        --shadow-md: 0 14px 36px rgba(0, 0, 0, .26);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg-2);
    }

    body {
      min-height: var(--app-height);
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at 12% 18%, var(--page-glow-a), transparent 26%),
        radial-gradient(circle at 88% 14%, var(--page-glow-b), transparent 28%),
        radial-gradient(circle at 72% 82%, var(--page-glow-c), transparent 24%),
        radial-gradient(circle at 16% 84%, var(--page-glow-d), transparent 24%),
        linear-gradient(160deg, var(--page-grad-1) 0%, var(--page-grad-2) 52%, var(--page-grad-3) 100%);
      transition: background .45s ease, color .25s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.9), transparent 78%);
      opacity: var(--page-grid-opacity);
      transition: opacity .45s ease;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, var(--page-overlay-top), var(--page-overlay-bottom)),
        radial-gradient(circle at 50% 0%, transparent 24%, var(--page-overlay-bottom) 100%);
      transition: background .45s ease;
    }

    body[data-app-phase="late"] {

        --page-glow-c: rgba(18, 26, 46, .16);

        --page-overlay-top: rgba(1, 4, 10, .40);

    }

    .app {
      width: 100%;
      min-height: var(--app-height);
      height: var(--app-height);
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      overflow: hidden;
    }

    .shell {
      width: min(1320px, 100%);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow-lg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255,255,255,.58), transparent 24%, transparent 74%, rgba(255,255,255,.18)),
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.74), transparent 20%);
      opacity: .72;
      mix-blend-mode: screen;
    }

    .hero {
      padding: 18px;
      position: relative;
      top: auto;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero,
    .hero-clock,
    .mini-panel {
      transition: background .32s ease, border-color .32s ease, box-shadow .32s ease;
    }

    .hero[data-phase="early"] {
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 196, 116, .16), transparent 26%),
        radial-gradient(circle at 100% 100%, rgba(255, 225, 174, .18), transparent 28%),
        linear-gradient(180deg, rgba(255, 251, 245, .84), rgba(245, 247, 252, .70));
    }

    .hero[data-phase="morning"] {
      background:
        radial-gradient(circle at 0% 0%, rgba(65, 217, 169, .22), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(85, 197, 255, .20), transparent 30%),
        linear-gradient(180deg, rgba(238, 252, 247, .92), rgba(231, 246, 255, .78));
      border-color: rgba(65, 217, 169, .16);
      box-shadow: 0 22px 48px rgba(37, 122, 96, .10);
    }

    .hero[data-phase="day"] {
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 171, 77, .16), transparent 26%),
        radial-gradient(circle at 100% 100%, rgba(255, 141, 180, .14), transparent 28%),
        linear-gradient(180deg, rgba(255, 249, 243, .84), rgba(249, 243, 250, .70));
    }

    .hero[data-phase="night"] {
      background:
        radial-gradient(circle at 0% 0%, rgba(85, 197, 255, .16), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(138, 125, 255, .24), transparent 30%),
        linear-gradient(180deg, rgba(221, 229, 246, .92), rgba(194, 207, 230, .84));
      border-color: rgba(68, 86, 136, .18);
      box-shadow: 0 26px 58px rgba(30, 40, 72, .20);
    }

    .hero[data-phase="late"] {
      background:
        radial-gradient(circle at 0% 0%, rgba(85, 197, 255, .14), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(138, 125, 255, .24), transparent 30%),
        linear-gradient(180deg, rgba(196, 207, 226, .92), rgba(163, 177, 204, .86));
      border-color: rgba(45, 58, 96, .22);
      box-shadow: 0 28px 66px rgba(13, 20, 36, .24);
    }

    .hero[data-phase="early"] .hero-clock,
    .hero[data-phase="early"] .mini-panel {
      background: linear-gradient(145deg, rgba(255, 235, 204, .36), rgba(255,255,255,.18));

    .hero[data-phase="morning"] .hero-clock,
    .hero[data-phase="morning"] .mini-panel {
      background: linear-gradient(145deg, rgba(163, 250, 222, .34), rgba(255,255,255,.18));
      border-color: rgba(65, 217, 169, .14);
    }

    .hero[data-phase="day"] .hero-clock,
    .hero[data-phase="day"] .mini-panel {
      background: linear-gradient(145deg, rgba(255, 227, 197, .30), rgba(255,245,249,.18));
    }

    .hero[data-phase="night"] .hero-clock,
    .hero[data-phase="night"] .mini-panel {
      background: linear-gradient(145deg, rgba(152, 169, 214, .34), rgba(226,233,247,.16));
      border-color: rgba(68, 86, 136, .18);
      box-shadow: 0 18px 32px rgba(24, 32, 58, .18);
    }

    .hero[data-phase="late"] .hero-clock,
    .hero[data-phase="late"] .mini-panel {
      background: linear-gradient(145deg, rgba(132, 150, 191, .40), rgba(213,222,238,.12));

      box-shadow: 0 18px 34px rgba(13, 20, 36, .22);

      .hero[data-phase="morning"] {

          radial-gradient(circle at 0% 0%, rgba(65, 217, 169, .18), transparent 28%),

          linear-gradient(180deg, rgba(14, 40, 34, .90), rgba(11, 24, 34, .80));

        box-shadow: 0 24px 56px rgba(0, 0, 0, .24);
      }

      .hero[data-phase="day"] {
        background:
          radial-gradient(circle at 0% 0%, rgba(255, 171, 77, .14), transparent 26%),

    .hero-head,
    .hero-foot,
    .hero-main,
    .content-head,
    .clock-card,
    .mini-panel,
    .meta-pill,
    .card-pill,
    .dial,
    .dial-center,
    .dial::before,
    .chip {
      position: relative;
      z-index: 1;
    }

    .hero-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .app-icon {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 26% 16%, rgba(255,255,255,.95), transparent 18%),
        linear-gradient(145deg, rgba(79,124,255,.98), rgba(85,197,255,.90) 46%, rgba(138,125,255,.92));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78), 0 14px 30px rgba(79,124,255,.26);
    }

    .app-icon::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 2px solid rgba(255,255,255,.92);
      border-radius: 50%;
    }

    .app-icon::after {
      content: "";
      position: absolute;
      left: 28px;
      top: 18px;
      width: 3px;
      height: 13px;
      background: rgba(255,255,255,.98);
      border-radius: 999px;
      transform-origin: 50% 100%;
      box-shadow: 8px 10px 0 rgba(255,255,255,.92);
    }

    .brand-copy { min-width: 0; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 8px rgba(65, 217, 169, .15);
    }

          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        }, { passive: false });

        ["gesturestart", "gesturechange", "gestureend"].forEach(function (eventName) {
          document.addEventListener(eventName, function (event) {

      lockMobileGestures();

      function syncViewportHeight() {
        var viewport = window.visualViewport;
        var innerHeight = window.innerHeight || 0;
        var viewportHeight = viewport && viewport.height ? viewport.height : 0;
        var clientHeight = document.documentElement.clientHeight || 0;
        var height = Math.max(innerHeight, viewportHeight, clientHeight);
        if (!height) return;
        document.documentElement.style.setProperty("--app-height", Math.ceil(height) + "px");
      }

      syncViewportHeight();
      $(window).on("resize orientationchange", syncViewportHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncViewportHeight);
      }

      function prettyZone(zone) {
        return (zone || "UTC").replace(/_/g, " ");
      }

      function getGlobalPhaseForPage(phaseKey) {
        var pagePhaseMap = {
          early: "early",
          morning: "morning",
          day: "day",
          night: "morning",
          late: "early"
        };

        return pagePhaseMap[phaseKey] || "morning";
      }

      function applyGlobalPhase(phaseKey) {
        var themeMap = {
          early: "#f7efe3",
          morning: "#eef6f1",
          day: "#fff1e7",
          night: "#eef6f1",
          late: "#f7efe3"
        };

        document.documentElement.setAttribute("data-app-phase", phaseKey);
        document.body.setAttribute("data-app-phase", phaseKey);
        var heroPanel = document.getElementById("heroPanel");
        if (heroPanel) {
          heroPanel.setAttribute("data-phase", phaseKey);
        }

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta && themeMap[phaseKey]) {
          themeMeta.setAttribute("content", themeMap[phaseKey]);
        }
      }

      var localTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";

      var I18N = {
        zh: {
          locale: "zh-CN",
          htmlLang: "zh-CN",
          title: "世界时钟",
          switchLanguage: "切换语言",
          today: "今天",
          synced: "已同步",
          timeZoneLabel: "时区",
          localDiffLabel: "相对本地",
          heroZonePrefix: "时区：",
          cities: {
            local: "当前位置",
            monterrey: "蒙特雷",
            beijing: "北京",
            istanbul: "伊斯坦布尔"
          },
          countries: {
            mexico: "墨西哥",
            china: "中国",
            turkey: "土耳其"
          },
          phases: {
            early: "早上",
            morning: "上午",
            day: "下午",
            night: "夜晚",
            late: "深夜"
          },
          sameZone: "与本地时区一致",
          sameZoneShort: "本地时区",
          ahead: "快",
          behind: "慢",
          hour: "小时",
          minute: "分"
        },
        en: {
          locale: "en-US",
          htmlLang: "en",
          title: "World Clock",
          switchLanguage: "Switch language",
          today: "Today",
          synced: "Synced",
          timeZoneLabel: "Time zone",
          localDiffLabel: "Relative to local",
          heroZonePrefix: "Time zone: ",
          cities: {
            local: "Current Location",
            monterrey: "Monterrey",
            beijing: "Beijing",
            istanbul: "Istanbul"
          },
          countries: {
            mexico: "Mexico",
            china: "China",
            turkey: "Turkey"
          },
          phases: {
            early: "Early morning",
            morning: "Morning",
            day: "Afternoon",
            night: "Night",
            late: "Late night"
          },
          sameZone: "Same as local time zone",
          sameZoneShort: "Local time zone",
          ahead: "ahead",
          behind: "behind",
          hour: "h",
          minute: "m",
          months: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
        },
        tr: {
          locale: "tr-TR",
          htmlLang: "tr",
          title: "Dünya Saati",
          switchLanguage: "Dili değiştir",
          today: "Bugün",
          synced: "Senkronize edildi",
          timeZoneLabel: "Saat dilimi",
          localDiffLabel: "Yerel saate göre",
          heroZonePrefix: "Saat dilimi: ",
          cities: {
            local: "Mevcut konum",
            monterrey: "Monterrey",
            beijing: "Pekin",
            istanbul: "İstanbul"
          },
          countries: {
            mexico: "Meksika",
            china: "Çin",
            turkey: "Türkiye"
          },
          phases: {
            early: "Erken sabah",
            morning: "Sabah",
            day: "Öğleden sonra",
            night: "Gece",
            late: "Gece geç"
          },
          sameZone: "Yerel saat dilimiyle aynı",
          sameZoneShort: "Yerel saat dilimi",
          ahead: "ileride",
          behind: "geride",
          hour: "sa",
          minute: "dk",
          months: ["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"]
        }
      };

      function detectLanguage() {
        var language = (navigator.languages && navigator.languages.length ? navigator.languages[0] : navigator.language || "zh-CN").toLowerCase();
        if (language.indexOf("zh") === 0) return "zh";
        if (language.indexOf("tr") === 0) return "tr";
        return "en";
      }

      var LANGUAGE_ORDER = ["zh", "en", "tr"];
      var LANGUAGE_LABELS = {
        zh: "中",
        en: "EN",
        tr: "TR"
      };
      var LANGUAGE_NAMES = {
        zh: "中文",
        en: "English",
        tr: "Türkçe"
      };
      var MANIFEST_BY_LANGUAGE = {
        zh: "./manifest.webmanifest",
        en: "./manifest-en.webmanifest",
        tr: "./manifest-tr.webmanifest"
      };

      var currentLang = /^(zh|en|tr)$/.test(window.__WORLD_CLOCK_DEFAULT_LANG__ || "") ? window.__WORLD_CLOCK_DEFAULT_LANG__ : detectLanguage();

      function texts() {
        return I18N[currentLang] || I18N.zh;
      }

      function getNextLanguage(lang) {
        var index = LANGUAGE_ORDER.indexOf(lang);
        return LANGUAGE_ORDER[(index + 1) % LANGUAGE_ORDER.length] || "zh";
      }

      function updateManifestLink() {
        var manifest = document.getElementById("dynamicManifest") || document.querySelector('link[rel="manifest"]');
        if (manifest) {
          manifest.setAttribute("href", MANIFEST_BY_LANGUAGE[currentLang] || MANIFEST_BY_LANGUAGE.zh);
        }
      }

      function updateLanguageButton() {
        var dictionary = texts();
        var label = dictionary.switchLanguage + "：" + LANGUAGE_NAMES[currentLang];

        $("#languageSwitch")
          .attr("aria-label", label)
          .attr("title", label);
        $("#languageSwitchCurrent").text(LANGUAGE_LABELS[currentLang]);
        $(".language-option").each(function () {
          var $option = $(this);
          var isActive = $option.attr("data-lang") === currentLang;
          $option.toggleClass("is-active", isActive).attr("aria-checked", isActive ? "true" : "false");
        });
      }

      function setLanguageMenuOpen(isOpen) {
        $("#languageFloat").toggleClass("is-open", isOpen);
        $("#languageSwitch").attr("aria-expanded", isOpen ? "true" : "false");
        $("#languageMenu").attr("aria-hidden", isOpen ? "false" : "true");
      }

      function applyStaticLanguage() {
        var dictionary = texts();
        document.documentElement.lang = dictionary.htmlLang;
        document.title = dictionary.title;
        $(".shell").attr("aria-label", dictionary.title);
        $(".content-title").text(dictionary.title);
        updateManifestLink();
        updateLanguageButton();

        var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (appleTitle) {
          appleTitle.setAttribute("content", dictionary.title);
        }
      }

      function setLanguage(languageKey, shouldSave) {
        if (!I18N[languageKey] || languageKey === currentLang) return;
        currentLang = languageKey;

        if (shouldSave) {
          try {
            localStorage.setItem("worldClockLanguage", currentLang);
          } catch (error) {}
        }

        applyStaticLanguage();
        buildCards();
        tick();
      }

      function normalizeTimeZone(timeZone) {
        try {
          return new Intl.DateTimeFormat("en-US", { timeZone: timeZone }).resolvedOptions().timeZone || timeZone;
        } catch (error) {
          return timeZone;
        }
      }

      var clocks = [
        {
          id: "local",
          cityKey: "local",
          timeZone: localTimeZone,
          tone: "local"
        },
        {
          id: "monterrey",
          cityKey: "monterrey",
          countryKey: "mexico",
          timeZone: "America/Monterrey",
          tone: "monterrey"
        },
        {
          id: "beijing",
          cityKey: "beijing",
          countryKey: "china",
          timeZone: "Asia/Shanghai",
          tone: "beijing"
        },
        {
          id: "istanbul",
          cityKey: "istanbul",
          countryKey: "turkey",
          timeZone: "Europe/Istanbul",
          tone: "istanbul"
        }
      ];

      var mobileLayoutQuery = window.matchMedia ? window.matchMedia("(max-width: 1024px)") : null;

      function isMobileLayout() {
        return mobileLayoutQuery ? mobileLayoutQuery.matches : false;
      }

      function isSameLocalMinute(date, timeZone) {
        var localParts = getParts(date, localTimeZone);
        var targetParts = getParts(date, timeZone);

        return localParts.year === targetParts.year &&
          localParts.month === targetParts.month &&
          localParts.day === targetParts.day &&
          localParts.hour === targetParts.hour &&
          localParts.minute === targetParts.minute;
      }

      function getVisibleClocks(date) {
        if (!isMobileLayout()) return clocks;

        return clocks.filter(function (clock) {
          if (clock.id === "local") return true;
          return !isSameLocalMinute(date, clock.timeZone);
        });
      }

      $("#miniZone").text(prettyZone(localTimeZone));
      $("#heroZone").text(texts().heroZonePrefix + prettyZone(localTimeZone));

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function getParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat(texts().locale, {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function (part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        return {
          year: parts.year,
          month: parts.month,
          day: parts.day,
          weekday: parts.weekday,
          hour: hour,
          minute: parseInt(parts.minute, 10)
        };
      }

      function getOffsetMinutes(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-US", {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function (part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        var utcTime = Date.UTC(
          parseInt(parts.year, 10),
          parseInt(parts.month, 10) - 1,
          parseInt(parts.day, 10),
          hour,
          parseInt(parts.minute, 10),
          0
        );

        var referenceTime = new Date(date.getTime());
        referenceTime.setSeconds(0, 0);

        return Math.round((utcTime - referenceTime.getTime()) / 60000);
      }

      function formatTime(parts) {
        return pad(parts.hour) + ":" + pad(parts.minute);
      }

      function localizedMonth(month) {
        return texts().months[parseInt(month, 10) - 1] || month;
      }

      function formatFullDate(parts) {
        if (currentLang === "zh") {
          return parts.year + "年" + parts.month + "月" + parts.day + "日 · " + parts.weekday;
        }

        if (currentLang === "tr") {
          return parseInt(parts.day, 10) + " " + localizedMonth(parts.month) + " " + parts.year + " · " + parts.weekday;
        }

        return localizedMonth(parts.month) + " " + parseInt(parts.day, 10) + ", " + parts.year + " · " + parts.weekday;
      }

      function formatShortDate(parts) {
        if (currentLang === "zh") {
          return parts.month + "月" + parts.day + "日 · " + parts.weekday;
        }

        if (currentLang === "tr") {
          return parseInt(parts.day, 10) + " " + localizedMonth(parts.month) + " · " + parts.weekday;
        }

        return localizedMonth(parts.month) + " " + parseInt(parts.day, 10) + " · " + parts.weekday;
      }

      function formatMonthDay(parts) {
        if (currentLang === "zh") {
          return parts.month + "月" + parts.day + "日";
        }

        if (currentLang === "tr") {
          return parseInt(parts.day, 10) + " " + localizedMonth(parts.month);
        }

        return localizedMonth(parts.month) + " " + parseInt(parts.day, 10);
      }

      function formatUtcOffset(minutes) {
        var sign = minutes >= 0 ? "+" : "-";
        var abs = Math.abs(minutes);
        return "UTC" + sign + pad(Math.floor(abs / 60)) + ":" + pad(abs % 60);
      }

      function formatDiff(targetMinutes, localMinutes) {
        var dictionary = texts();
        var diff = targetMinutes - localMinutes;
        if (diff === 0) return dictionary.sameZone;

        var abs = Math.abs(diff);
        var hours = Math.floor(abs / 60);
        var minutes = abs % 60;

        if (currentLang === "zh") {
          var sign = diff > 0 ? dictionary.ahead : dictionary.behind;
          return minutes === 0 ? sign + hours + dictionary.hour : sign + hours + dictionary.hour + minutes + dictionary.minute;
        }

        if (currentLang === "tr") {
          var trDirection = diff > 0 ? dictionary.ahead : dictionary.behind;
          var trAmount = minutes === 0 ? hours + " " + dictionary.hour : hours + " " + dictionary.hour + " " + minutes + " " + dictionary.minute;
          return trAmount + " " + trDirection;
        }

        var direction = diff > 0 ? dictionary.ahead : dictionary.behind;
        var amount = minutes === 0 ? hours + dictionary.hour : hours + dictionary.hour + " " + minutes + dictionary.minute;
        return amount + " " + direction;
      }

      function getPhase(parts) {
        var hour = parts.hour;
        var phaseKey = "late";
        if (hour >= 5 && hour < 9) phaseKey = "early";
        else if (hour >= 9 && hour < 12) phaseKey = "morning";
        else if (hour >= 12 && hour < 18) phaseKey = "day";
        else if (hour >= 18 && hour < 23) phaseKey = "night";

        return { key: phaseKey, label: texts().phases[phaseKey] };
      }

      function rotateHands($card, parts) {
        var minuteDeg = parts.minute * 6;
        var hourDeg = ((parts.hour % 12) + parts.minute / 60) * 30;

        $card.find(".hour").css("transform", "translateX(-50%) rotate(" + hourDeg + "deg)");
        $card.find(".minute").css("transform", "translateX(-50%) rotate(" + minuteDeg + "deg)");
      }

      function buildCards() {
        var template = $("#clockTemplate").html();
        var $grid = $("#clockGrid");
        var visibleClocks = getVisibleClocks(new Date());

        $grid.empty();
        $("#cityCount").text(visibleClocks.length);

        visibleClocks.forEach(function (clock) {
          var $card = $(template);
          $card.attr("data-id", clock.id);
          $card.attr("data-tz", clock.timeZone);
          $card.attr("data-tone", clock.tone);
          var dictionary = texts();
          var country = clock.id === "local" ? prettyZone(localTimeZone) : dictionary.countries[clock.countryKey];
          $card.find(".city").text(dictionary.cities[clock.cityKey]);
          $card.find(".country").text(country);
          $grid.append($card);
        });
      }

      function tick() {
        var now = new Date();
        var localOffset = getOffsetMinutes(now, localTimeZone);
        var localParts = getParts(now, localTimeZone);
        var localPhase = getPhase(localParts);

        applyGlobalPhase(getGlobalPhaseForPage(localPhase.key));

        $("#heroTime").text(formatTime(localParts));
        $("#heroDate").text(formatFullDate(localParts));
        $("#heroZone").text(texts().heroZonePrefix + prettyZone(localTimeZone));
        $("#miniUtc").text(formatUtcOffset(localOffset));
        $("#lastSync").text(formatTime(localParts));
        $("#contentMeta").text(texts().today + " · " + formatFullDate(localParts) + " · " + texts().synced);

        $(".clock-card").each(function () {
          var $card = $(this);
          var timeZone = $card.attr("data-tz");
          var parts = getParts(now, timeZone);
          var offset = getOffsetMinutes(now, timeZone);
          var phase = getPhase(parts);

          $card.attr("data-phase", phase.key);
          $card.find(".weekday").text(parts.weekday);
          $card.find(".phase").removeClass("phase-early phase-morning phase-day phase-night phase-late").addClass("phase-" + phase.key);
          $card.find(".phase-text").text(phase.label);
          $card.find(".time").text(formatTime(parts));
          $card.find(".date").text(formatShortDate(parts));
          $card.find(".mobile-title-date").text(formatMonthDay(parts));
          var dictionary = texts();
          var utcText = formatUtcOffset(offset);
          var diffText = formatDiff(offset, localOffset);
          var shortDiffText = diffText === dictionary.sameZone ? dictionary.sameZoneShort : diffText;

          $card.find(".utc-pill")
            .attr("data-label", dictionary.timeZoneLabel)
            .attr("data-value", utcText)
            .html("<span>" + dictionary.timeZoneLabel + "</span> " + utcText);
          $card.find(".diff-pill")
            .attr("data-label", dictionary.localDiffLabel)
            .attr("data-value", shortDiffText)
            .html("<span>" + dictionary.localDiffLabel + "</span> " + diffText);
          rotateHands($card, parts);
        });
      }

      $("#languageSwitch").on("click", function (event) {
        event.stopPropagation();
        setLanguageMenuOpen(!$("#languageFloat").hasClass("is-open"));
      });

      $(".language-option").on("click", function (event) {
        event.stopPropagation();
        var languageKey = $(this).attr("data-lang");
        setLanguage(languageKey, true);
        setLanguageMenuOpen(false);
      });

      $(document).on("click", function (event) {
        if (!$(event.target).closest("#languageFloat").length) {
          setLanguageMenuOpen(false);
        }
      });

      $(document).on("keydown", function (event) {
        if (event.key === "Escape") {
          setLanguageMenuOpen(false);
        }
      });

      applyStaticLanguage();
      buildCards();
      tick();
      setInterval(tick, 1000);

      if (mobileLayoutQuery) {
        var handleLayoutChange = function () {
          buildCards();
          tick();
        };

        if (mobileLayoutQuery.addEventListener) {
          mobileLayoutQuery.addEventListener("change", handleLayoutChange);
        } else if (mobileLayoutQuery.addListener) {
          mobileLayoutQuery.addListener(handleLayoutChange);
        }
      }

      if ("serviceWorker" in navigator && location.protocol === "https:") {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      }
    });
  </script>
