<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1f" />
  <meta name="color-scheme" content="dark" />
  <meta name="apple-mobile-web-app-title" content="世界时钟" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>世界时钟</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" href="./icon-192.png" />

  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #131b37;
      --bg3: #170f27;
      --glass: rgba(255,255,255,.12);
      --glass-2: rgba(255,255,255,.08);
      --glass-3: rgba(255,255,255,.16);
      --line: rgba(255,255,255,.18);
      --line-soft: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.66);
      --soft: rgba(255,255,255,.48);
      --cyan: #8ceeff;
      --mint: #92ffd2;
      --violet: #c9b3ff;
      --amber: #ffd4a3;
      --shadow: 0 28px 90px rgba(0,0,0,.32);
      --radius-xl: 30px;
      --radius-lg: 26px;
      --radius-md: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: #0b1020;
    }

    body {
      background:
        radial-gradient(circle at 10% 12%, rgba(140,238,255,.28), transparent 26%),
        radial-gradient(circle at 88% 14%, rgba(201,179,255,.22), transparent 28%),
        radial-gradient(circle at 50% 110%, rgba(255,212,163,.16), transparent 36%),
        linear-gradient(155deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg3) 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, black 0 40%, transparent 78%);
      pointer-events: none;
      opacity: .48;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 26% 36%, rgba(255,255,255,.12), transparent 16%),
        radial-gradient(circle at 70% 48%, rgba(255,255,255,.07), transparent 18%);
      filter: blur(46px);
      pointer-events: none;
      opacity: .55;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100svh;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .shell {
      width: min(1180px, 100%);
      height: min(740px, 100%);
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(10px, 1.4vw, 16px);
    }

    .glass {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07)),
        linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(160%);
      -webkit-backdrop-filter: blur(26px) saturate(160%);
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255,255,255,.28), transparent 30%, transparent 70%, rgba(255,255,255,.10)),
        radial-gradient(circle at top left, rgba(255,255,255,.20), transparent 28%);
      pointer-events: none;
      opacity: .72;
    }

    .glass::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: -44%;
      height: 60%;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
      filter: blur(24px);
      pointer-events: none;
      opacity: .8;
    }

    .topbar {
      height: clamp(84px, 12vh, 110px);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 2.5vw, 28px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      flex: 0 0 auto;
      position: relative;
      background:
        linear-gradient(145deg, rgba(255,255,255,.28), rgba(255,255,255,.08)),
        linear-gradient(145deg, rgba(140,238,255,.85), rgba(201,179,255,.82));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.45),
        0 16px 36px rgba(140,238,255,.20);
    }

    .logo::before {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      border: 2px solid rgba(12,16,32,.72);
    }

    .logo::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 12px;
      border-radius: 999px;
      background: rgba(12,16,32,.78);
      left: calc(50% - 1.5px);
      top: 15px;
      box-shadow: 7px 10px 0 0 rgba(140,238,255,.98);
      transform-origin: bottom center;
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(24px, 2.9vw, 36px);
      line-height: 1;
      letter-spacing: -1.1px;
      font-weight: 830;
      white-space: nowrap;
    }

    .title .sub {
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: clamp(11px, 1.1vw, 13px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 6px rgba(146,255,210,.10);
      flex: 0 0 auto;
    }

    .hero-now {
      text-align: right;
      flex: 0 0 auto;
    }

    .hero-time {
      font-size: clamp(28px, 4.6vw, 48px);
      line-height: .92;
      letter-spacing: -1.6px;
      font-weight: 860;
      font-variant-numeric: tabular-nums;
    }

    .hero-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: clamp(12px, 1.1vw, 14px);
      white-space: nowrap;
    }

    .clock-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(10px, 1.4vw, 16px);
    }

    .clock-card {
      min-height: 0;
      border-radius: var(--radius-xl);
      padding: clamp(14px, 1.9vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .clock-card[data-tone="local"] {
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07)),
        radial-gradient(circle at 16% 10%, rgba(146,255,210,.12), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .clock-card[data-tone="beijing"] {
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07)),
        radial-gradient(circle at 16% 10%, rgba(255,212,163,.14), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .clock-card[data-tone="istanbul"] {
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07)),
        radial-gradient(circle at 16% 10%, rgba(201,179,255,.14), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .place {
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(22px, 2.2vw, 30px);
      line-height: 1.04;
      letter-spacing: -.7px;
      font-weight: 830;
    }

    .zone {
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(12px, 1vw, 13px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weekday-pill {
      flex: 0 0 auto;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.82);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
      white-space: nowrap;
    }

    .center {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 0;
    }

    .dial-wrap {
      position: relative;
      width: min(18vw, 168px);
      max-width: 168px;
      min-width: 112px;
      aspect-ratio: 1;
    }

    .dial-shadow {
      position: absolute;
      inset: 8% 10% 0;
      border-radius: 50%;
      background: rgba(255,255,255,.10);
      filter: blur(20px);
      transform: translateY(12px);
    }

    .dial {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.22);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.94) 0 4px, transparent 5px),
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.24), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.06));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        inset 0 -12px 28px rgba(255,255,255,.04),
        0 22px 40px rgba(0,0,0,.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .dial::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.13);
    }

    .dial::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      top: 6%;
      height: 26%;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      filter: blur(10px);
      opacity: .72;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
    }

    .hour {
      height: 28%;
      width: 5px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 0 14px rgba(255,255,255,.12);
    }

    .minute {
      height: 39%;
      width: 3px;
      background: rgba(255,255,255,.84);
      box-shadow: 0 0 14px rgba(255,255,255,.10);
    }

    .second {
      height: 43%;
      width: 2px;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(140,238,255,.55);
    }

    .digital {
      text-align: center;
    }

    .time {
      font-size: clamp(36px, 4.3vw, 56px);
      line-height: .92;
      letter-spacing: -1.8px;
      font-weight: 860;
      font-variant-numeric: tabular-nums;
    }

    .date-row {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      max-width: 100%;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      border: 1px solid var(--line-soft);
      color: rgba(255,255,255,.84);
      font-size: clamp(12px, 1vw, 14px);
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .offset {
      margin-top: 10px;
      color: var(--soft);
      font-size: clamp(12px, 1vw, 13px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 840px) {
      .app {
        align-items: stretch;
        padding:
          max(10px, env(safe-area-inset-top))
          max(10px, env(safe-area-inset-right))
          max(10px, env(safe-area-inset-bottom))
          max(10px, env(safe-area-inset-left));
      }

      .shell {
        height: 100%;
        gap: 8px;
      }

      .topbar {
        height: clamp(72px, 11svh, 90px);
        border-radius: 24px;
        padding: 12px 14px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 16px;
      }

      .title h1 {
        font-size: clamp(20px, 5.2vw, 28px);
      }

      .hero-time {
        font-size: clamp(24px, 7vw, 34px);
      }

      .hero-meta {
        font-size: 11px;
      }

      .clock-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .clock-card {
        border-radius: 24px;
        padding: 12px;
        grid-template-columns: 1.08fr auto;
        grid-template-rows: auto 1fr;
        column-gap: 12px;
        align-items: center;
      }

      .card-head {
        grid-column: 1;
      }

      .center {
        grid-column: 2;
        grid-row: 1 / span 2;
      }

      .digital {
        grid-column: 1;
        text-align: left;
        align-self: end;
      }

      .city {
        font-size: clamp(19px, 5vw, 24px);
      }

      .zone {
        font-size: 11px;
      }

      .weekday-pill {
        padding: 7px 10px;
        font-size: 11px;
      }

      .dial-wrap {
        width: clamp(86px, 24vw, 114px);
        min-width: 86px;
      }

      .time {
        font-size: clamp(32px, 9vw, 44px);
      }

      .date-row {
        margin-top: 7px;
        padding: 7px 10px;
        font-size: 11px;
        justify-content: flex-start;
      }

      .offset {
        margin-top: 6px;
        font-size: 11px;
      }
    }

    @media (max-width: 390px), (max-height: 680px) {
      .app {
        padding:
          max(8px, env(safe-area-inset-top))
          max(8px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(8px, env(safe-area-inset-left));
      }

      .shell {
        gap: 6px;
      }

      .topbar {
        height: 64px;
        border-radius: 20px;
        padding: 10px 12px;
      }

      .logo {
        width: 38px;
        height: 38px;
        border-radius: 14px;
      }

      .title h1 {
        font-size: 18px;
      }

      .title .sub {
        font-size: 10px;
        margin-top: 5px;
      }

      .hero-time {
        font-size: 21px;
      }

      .hero-meta {
        display: none;
      }

      .clock-card {
        padding: 10px;
        border-radius: 20px;
      }

      .city {
        font-size: 17px;
      }

      .zone {
        margin-top: 4px;
      }

      .weekday-pill {
        display: none;
      }

      .dial-wrap {
        width: clamp(72px, 22vw, 90px);
        min-width: 72px;
      }

      .time {
        font-size: clamp(28px, 8.8vw, 36px);
      }

      .date-row {
        padding: 6px 9px;
        font-size: 10px;
      }

      .offset {
        font-size: 10px;
      }
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .glass,
      .clock-card {
        background: rgba(22, 27, 49, .95) !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="世界时钟">
      <header class="topbar glass">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="title">
            <h1>世界时钟</h1>
            <div class="sub">
              <span class="dot"></span>
              <span id="localZone">--</span>
            </div>
          </div>
        </div>
        <div class="hero-now">
          <div class="hero-time" id="heroTime">--:--:--</div>
          <div class="hero-meta" id="heroMeta">--</div>
        </div>
      </header>

      <section class="clock-grid" id="clockGrid"></section>
    </section>
  </main>

  <template id="clockTemplate">
    <article class="clock-card glass">
      <div class="card-head">
        <div class="place">
          <h2 class="city"></h2>
          <div class="zone"></div>
        </div>
        <div class="weekday-pill"></div>
      </div>

      <div class="center" aria-hidden="true">
        <div class="dial-wrap">
          <div class="dial-shadow"></div>
          <div class="dial">
            <span class="hand hour"></span>
            <span class="hand minute"></span>
            <span class="hand second"></span>
          </div>
        </div>
      </div>

      <div class="digital">
        <div class="time"></div>
        <div class="date-row"></div>
        <div class="offset"></div>
      </div>
    </article>
  </template>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
      var localTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";

      var clocks = [
        {
          id: "local",
          city: "当前位置",
          zone: localTimeZone.replaceAll("_", " "),
          timeZone: localTimeZone,
          tone: "local"
        },
        {
          id: "beijing",
          city: "北京",
          zone: "中国",
          timeZone: "Asia/Shanghai",
          tone: "beijing"
        },
        {
          id: "istanbul",
          city: "伊斯坦布尔",
          zone: "土耳其",
          timeZone: "Europe/Istanbul",
          tone: "istanbul"
        }
      ];

      $("#localZone").text(localTimeZone.replaceAll("_", " "));

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function getParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("zh-CN", {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function(part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        return {
          year: parts.year,
          month: parts.month,
          day: parts.day,
          weekday: parts.weekday,
          hour: hour,
          minute: parseInt(parts.minute, 10),
          second: parseInt(parts.second, 10)
        };
      }

      function getOffsetMinutes(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-US", {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function(part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        var utcTime = Date.UTC(
          parseInt(parts.year, 10),
          parseInt(parts.month, 10) - 1,
          parseInt(parts.day, 10),
          hour,
          parseInt(parts.minute, 10),
          parseInt(parts.second, 10)
        );

        return Math.round((utcTime - date.getTime()) / 60000);
      }

      function formatUtcOffset(minutes) {
        var sign = minutes >= 0 ? "+" : "-";
        var abs = Math.abs(minutes);
        return "UTC" + sign + pad(Math.floor(abs / 60)) + ":" + pad(abs % 60);
      }

      function formatDiff(targetMinutes, localMinutes) {
        var diff = targetMinutes - localMinutes;
        if (diff === 0) return "本地时区";
        var sign = diff > 0 ? "快" : "慢";
        var abs = Math.abs(diff);
        var hours = Math.floor(abs / 60);
        var minutes = abs % 60;
        return minutes === 0 ? sign + hours + "小时" : sign + hours + "小时" + minutes + "分";
      }

      function formatFullDate(parts) {
        return parts.year + "年" + parts.month + "月" + parts.day + "日";
      }

      function formatMonthDay(parts) {
        return parts.month + "月" + parts.day + "日";
      }

      function rotateHands($card, parts) {
        var secondDeg = parts.second * 6;
        var minuteDeg = (parts.minute + parts.second / 60) * 6;
        var hourDeg = ((parts.hour % 12) + parts.minute / 60) * 30;

        $card.find(".hour").css("transform", "translateX(-50%) rotate(" + hourDeg + "deg)");
        $card.find(".minute").css("transform", "translateX(-50%) rotate(" + minuteDeg + "deg)");
        $card.find(".second").css("transform", "translateX(-50%) rotate(" + secondDeg + "deg)");
      }

      function buildCards() {
        var html = $("#clockTemplate").html();
        var $grid = $("#clockGrid");
        clocks.forEach(function(clock) {
          var $card = $(html);
          $card.attr("data-id", clock.id);
          $card.attr("data-tz", clock.timeZone);
          $card.attr("data-tone", clock.tone);
          $card.find(".city").text(clock.city);
          $card.find(".zone").text(clock.zone);
          $grid.append($card);
        });
      }

      function tick() {
        var now = new Date();
        var localOffset = getOffsetMinutes(now, localTimeZone);
        var localParts = getParts(now, localTimeZone);

        $("#heroTime").text(
          pad(localParts.hour) + ":" + pad(localParts.minute) + ":" + pad(localParts.second)
        );
        $("#heroMeta").text(formatFullDate(localParts) + " · " + localParts.weekday);

        $(".clock-card").each(function() {
          var $card = $(this);
          var timeZone = $card.attr("data-tz");
          var parts = getParts(now, timeZone);
          var offset = getOffsetMinutes(now, timeZone);

          $card.find(".weekday-pill").text(parts.weekday);
          $card.find(".time").text(
            pad(parts.hour) + ":" + pad(parts.minute) + ":" + pad(parts.second)
          );
          $card.find(".date-row").text(formatMonthDay(parts) + " · " + parts.weekday);
          $card.find(".offset").text(formatUtcOffset(offset) + " · " + formatDiff(offset, localOffset));
          rotateHands($card, parts);
        });
      }

      buildCards();
      tick();
      setInterval(tick, 1000);

      if ("serviceWorker" in navigator && location.protocol === "https:") {
        navigator.serviceWorker.register("./sw.js").catch(function() {});
      }
    });
  </script>
</body>
</html>
