<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f7ff" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-title" content="世界时钟" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>世界时钟</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" href="./icon-192.png" />

  <style>
    :root {
      --text: rgba(16, 20, 32, .92);
      --muted: rgba(16, 20, 32, .54);
      --soft: rgba(16, 20, 32, .40);
      --glass: rgba(255, 255, 255, .42);
      --glass-strong: rgba(255, 255, 255, .58);
      --glass-light: rgba(255, 255, 255, .72);
      --line: rgba(255, 255, 255, .64);
      --line-dark: rgba(15, 23, 42, .08);
      --shadow: 0 30px 90px rgba(36, 46, 80, .20);
      --inner: inset 0 1px 0 rgba(255,255,255,.86), inset 0 -1px 0 rgba(255,255,255,.28);
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --accent-blue: #4da3ff;
      --accent-cyan: #58d8ff;
      --accent-mint: #55d6a7;
      --accent-orange: #ff9f43;
      --accent-purple: #9b7bff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255,255,255,.94);
        --muted: rgba(255,255,255,.62);
        --soft: rgba(255,255,255,.42);
        --glass: rgba(255,255,255,.13);
        --glass-strong: rgba(255,255,255,.18);
        --glass-light: rgba(255,255,255,.22);
        --line: rgba(255,255,255,.22);
        --line-dark: rgba(255,255,255,.08);
        --shadow: 0 32px 95px rgba(0,0,0,.34);
        --inner: inset 0 1px 0 rgba(255,255,255,.34), inset 0 -1px 0 rgba(255,255,255,.10);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #edf4ff;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 12% 16%, rgba(88,216,255,.60), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(155,123,255,.44), transparent 30%),
        radial-gradient(circle at 70% 88%, rgba(255,159,67,.36), transparent 32%),
        radial-gradient(circle at 20% 80%, rgba(85,214,167,.38), transparent 28%),
        linear-gradient(145deg, #f8fbff 0%, #eaf2ff 48%, #f8f1ff 100%);
    }

    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(circle at 12% 16%, rgba(88,216,255,.30), transparent 28%),
          radial-gradient(circle at 86% 12%, rgba(155,123,255,.30), transparent 30%),
          radial-gradient(circle at 70% 88%, rgba(255,159,67,.18), transparent 34%),
          radial-gradient(circle at 20% 80%, rgba(85,214,167,.22), transparent 28%),
          linear-gradient(145deg, #09111f 0%, #101a31 48%, #181022 100%);
      }
    }

    body::before {
      content: "";
      position: fixed;
      inset: -18%;
      background:
        radial-gradient(circle at 34% 32%, rgba(255,255,255,.40), transparent 15%),
        radial-gradient(circle at 64% 46%, rgba(255,255,255,.26), transparent 17%),
        radial-gradient(circle at 42% 74%, rgba(255,255,255,.24), transparent 14%);
      filter: blur(44px);
      opacity: .76;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0 34%, transparent 74%);
      opacity: .30;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100svh;
      padding:
        max(14px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .shell {
      width: min(1190px, 100%);
      height: min(720px, 100%);
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(10px, 1.35vw, 16px);
    }

    .liquid {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255,255,255,.56), rgba(255,255,255,.22) 44%, rgba(255,255,255,.12)),
        var(--glass);
      backdrop-filter: blur(34px) saturate(180%) brightness(1.04);
      -webkit-backdrop-filter: blur(34px) saturate(180%) brightness(1.04);
      box-shadow: var(--shadow), var(--inner);
    }

    @media (prefers-color-scheme: dark) {
      .liquid {
        background:
          linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.085) 48%, rgba(255,255,255,.055)),
          var(--glass);
      }
    }

    .liquid::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.74), transparent 22%),
        linear-gradient(135deg, rgba(255,255,255,.72), transparent 26%, transparent 76%, rgba(255,255,255,.26));
      opacity: .50;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .liquid::after {
      content: "";
      position: absolute;
      left: 9%;
      right: 9%;
      top: -34%;
      height: 58%;
      border-radius: 50%;
      background: rgba(255,255,255,.50);
      filter: blur(22px);
      opacity: .62;
      pointer-events: none;
    }

    .topbar {
      height: clamp(86px, 12vh, 112px);
      border-radius: 999px;
      padding: 12px clamp(16px, 2.4vw, 26px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .app-icon {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
      border-radius: 19px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,.92), transparent 20%),
        linear-gradient(145deg, rgba(77,163,255,.95), rgba(88,216,255,.88) 48%, rgba(155,123,255,.86));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.76),
        inset 0 -1px 0 rgba(255,255,255,.28),
        0 16px 36px rgba(77,163,255,.25);
    }

    .app-icon::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.92);
      box-shadow: inset 0 0 16px rgba(255,255,255,.20);
    }

    .app-icon::after {
      content: "";
      position: absolute;
      left: 27px;
      top: 18px;
      width: 3px;
      height: 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.98);
      transform-origin: 50% 100%;
      box-shadow: 8px 10px 0 rgba(255,255,255,.90);
    }

    .brand-text {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 3vw, 38px);
      line-height: 1;
      letter-spacing: -1.1px;
      font-weight: 760;
      white-space: nowrap;
    }

    .timezone {
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: clamp(12px, 1.1vw, 14px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent-mint);
      box-shadow: 0 0 0 7px rgba(85,214,167,.14);
    }

    .local-now {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      text-align: right;
    }

    .local-time {
      font-size: clamp(32px, 5vw, 54px);
      line-height: .9;
      letter-spacing: -1.9px;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .local-date {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(12px, 1.1vw, 14px);
      white-space: nowrap;
    }

    .clock-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(10px, 1.35vw, 16px);
    }

    .clock-card {
      border-radius: var(--radius-xl);
      min-height: 0;
      padding: clamp(16px, 2vw, 24px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      isolation: isolate;
    }

    .clock-card[data-tone="local"] .accent { background: linear-gradient(90deg, var(--accent-mint), var(--accent-cyan)); }
    .clock-card[data-tone="beijing"] .accent { background: linear-gradient(90deg, var(--accent-orange), #ffd166); }
    .clock-card[data-tone="istanbul"] .accent { background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); }

    .card-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .city-wrap {
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(24px, 2.4vw, 34px);
      line-height: 1.02;
      letter-spacing: -.9px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .country {
      margin-top: 7px;
      color: var(--muted);
      font-size: clamp(12px, 1vw, 14px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weekday {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line-dark);
      background: rgba(255,255,255,.24);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.54);
      color: var(--text);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    @media (prefers-color-scheme: dark) {
      .weekday {
        background: rgba(255,255,255,.10);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
      }
    }

    .stage {
      min-height: 0;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
    }

    .bubble {
      width: min(17vw, 164px);
      max-width: 164px;
      min-width: 108px;
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      border: 1px solid rgba(255,255,255,.55);
      background:
        radial-gradient(circle at 32% 22%, rgba(255,255,255,.92), transparent 23%),
        radial-gradient(circle at 62% 70%, rgba(255,255,255,.20), transparent 30%),
        linear-gradient(145deg, rgba(255,255,255,.42), rgba(255,255,255,.12));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.74),
        inset 0 -18px 34px rgba(255,255,255,.10),
        0 24px 46px rgba(26,36,70,.18);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      .bubble {
        border-color: rgba(255,255,255,.24);
        background:
          radial-gradient(circle at 32% 22%, rgba(255,255,255,.28), transparent 24%),
          radial-gradient(circle at 62% 70%, rgba(255,255,255,.12), transparent 32%),
          linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.055));
      }
    }

    .bubble::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.36);
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: 44% 44%;
      border-radius: 50%;
      background: rgba(255,255,255,.88);
      box-shadow: 0 0 18px rgba(255,255,255,.24);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      border-radius: 999px;
      transform-origin: 50% 100%;
      background: var(--text);
      opacity: .88;
    }

    .hour {
      width: 5px;
      height: 28%;
    }

    .minute {
      width: 3px;
      height: 39%;
    }

    .digital {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .time {
      font-size: clamp(44px, 5.4vw, 72px);
      line-height: .88;
      letter-spacing: -2.7px;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .accent {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      margin: 13px auto 0;
      opacity: .82;
      box-shadow: 0 8px 20px rgba(77,163,255,.18);
    }

    .date {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      max-width: 100%;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--line-dark);
      background: rgba(255,255,255,.24);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.52);
      color: var(--text);
      font-size: clamp(12px, 1.05vw, 14px);
      white-space: nowrap;
    }

    .diff {
      margin-top: 10px;
      color: var(--soft);
      font-size: clamp(12px, 1vw, 13px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (prefers-color-scheme: dark) {
      .date {
        background: rgba(255,255,255,.10);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
      }
    }

    @media (max-width: 860px) {
      .app {
        align-items: stretch;
        padding:
          max(10px, env(safe-area-inset-top))
          max(10px, env(safe-area-inset-right))
          max(10px, env(safe-area-inset-bottom))
          max(10px, env(safe-area-inset-left));
      }

      .shell {
        width: 100%;
        height: 100%;
        gap: 8px;
      }

      .topbar {
        height: clamp(74px, 11svh, 92px);
        border-radius: 28px;
        padding: 10px 13px;
      }

      .app-icon {
        width: 44px;
        height: 44px;
        border-radius: 16px;
      }

      .app-icon::before {
        inset: 10px;
      }

      h1 {
        font-size: clamp(21px, 5.8vw, 28px);
      }

      .timezone {
        margin-top: 5px;
        font-size: 11px;
        max-width: 44vw;
      }

      .local-time {
        font-size: clamp(25px, 8vw, 36px);
        letter-spacing: -1.2px;
      }

      .local-date {
        margin-top: 5px;
        font-size: 11px;
      }

      .clock-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .clock-card {
        border-radius: 28px;
        padding: 12px;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto 1fr;
        column-gap: 12px;
        align-items: center;
      }

      .card-head {
        grid-column: 1;
      }

      .stage {
        grid-column: 2;
        grid-row: 1 / span 2;
        padding: 0;
      }

      .digital {
        grid-column: 1;
        text-align: left;
        align-self: end;
      }

      .city {
        font-size: clamp(20px, 5.4vw, 25px);
      }

      .country {
        margin-top: 4px;
        font-size: 11px;
      }

      .weekday {
        padding: 7px 9px;
        font-size: 11px;
      }

      .bubble {
        width: clamp(84px, 24vw, 112px);
        min-width: 84px;
      }

      .time {
        font-size: clamp(38px, 12vw, 50px);
        letter-spacing: -1.8px;
      }

      .accent {
        width: 34px;
        height: 4px;
        margin: 8px 0 0;
      }

      .date {
        margin-top: 7px;
        padding: 7px 10px;
        font-size: 11px;
      }

      .diff {
        margin-top: 5px;
        font-size: 11px;
      }
    }

    @media (max-width: 390px), (max-height: 690px) {
      .app {
        padding:
          max(8px, env(safe-area-inset-top))
          max(8px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(8px, env(safe-area-inset-left));
      }

      .shell {
        gap: 6px;
      }

      .topbar {
        height: 62px;
        border-radius: 24px;
      }

      .app-icon {
        width: 36px;
        height: 36px;
        border-radius: 13px;
      }

      .app-icon::before {
        inset: 8px;
        border-width: 1.5px;
      }

      h1 {
        font-size: 18px;
      }

      .timezone {
        display: none;
      }

      .local-time {
        font-size: 24px;
      }

      .local-date {
        font-size: 10px;
      }

      .clock-grid {
        gap: 6px;
      }

      .clock-card {
        border-radius: 23px;
        padding: 10px;
        column-gap: 8px;
      }

      .city {
        font-size: 18px;
      }

      .weekday {
        display: none;
      }

      .bubble {
        width: clamp(68px, 21vw, 86px);
        min-width: 68px;
      }

      .bubble::before {
        inset: 9px;
      }

      .time {
        font-size: clamp(32px, 10vw, 40px);
      }

      .date {
        margin-top: 6px;
        padding: 6px 9px;
        font-size: 10px;
      }

      .diff {
        display: none;
      }
    }

    @media (min-width: 861px) and (max-height: 670px) {
      .shell {
        height: 100%;
      }

      .topbar {
        height: 74px;
      }

      .app-icon {
        width: 44px;
        height: 44px;
        border-radius: 16px;
      }

      h1 {
        font-size: 26px;
      }

      .local-time {
        font-size: 38px;
      }

      .clock-card {
        padding: 14px;
      }

      .bubble {
        width: min(13vw, 118px);
        min-width: 94px;
      }

      .time {
        font-size: clamp(42px, 4.8vw, 56px);
      }

      .date {
        margin-top: 8px;
      }

      .diff {
        margin-top: 7px;
      }
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .liquid,
      .weekday,
      .date,
      .bubble {
        background: rgba(255,255,255,.82) !important;
      }

      @media (prefers-color-scheme: dark) {
        .liquid,
        .weekday,
        .date,
        .bubble {
          background: rgba(32,39,60,.94) !important;
        }
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="shell" aria-label="世界时钟">
      <header class="topbar liquid">
        <div class="brand">
          <div class="app-icon" aria-hidden="true"></div>
          <div class="brand-text">
            <h1>世界时钟</h1>
            <div class="timezone">
              <span class="status-dot"></span>
              <span id="localZone">--</span>
            </div>
          </div>
        </div>

        <div class="local-now">
          <div class="local-time" id="topTime">--:--</div>
          <div class="local-date" id="topDate">--</div>
        </div>
      </header>

      <section class="clock-grid" id="clockGrid"></section>
    </section>
  </main>

  <template id="clockTemplate">
    <article class="clock-card liquid">
      <div class="card-head">
        <div class="city-wrap">
          <h2 class="city"></h2>
          <div class="country"></div>
        </div>
        <div class="weekday"></div>
      </div>

      <div class="stage" aria-hidden="true">
        <div class="bubble">
          <span class="hand hour"></span>
          <span class="hand minute"></span>
        </div>
      </div>

      <div class="digital">
        <div class="time"></div>
        <div class="accent"></div>
        <div class="date"></div>
        <div class="diff"></div>
      </div>
    </article>
  </template>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
      var localTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";

      var clocks = [
        {
          id: "local",
          city: "当前位置",
          country: localTimeZone.replaceAll("_", " "),
          timeZone: localTimeZone,
          tone: "local"
        },
        {
          id: "beijing",
          city: "北京",
          country: "中国",
          timeZone: "Asia/Shanghai",
          tone: "beijing"
        },
        {
          id: "istanbul",
          city: "伊斯坦布尔",
          country: "土耳其",
          timeZone: "Europe/Istanbul",
          tone: "istanbul"
        }
      ];

      $("#localZone").text(localTimeZone.replaceAll("_", " "));

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function getParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("zh-CN", {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function(part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        return {
          year: parts.year,
          month: parts.month,
          day: parts.day,
          weekday: parts.weekday,
          hour: hour,
          minute: parseInt(parts.minute, 10)
        };
      }

      function getOffsetMinutes(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-US", {
          timeZone: timeZone,
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });

        var parts = {};
        formatter.formatToParts(date).forEach(function(part) {
          parts[part.type] = part.value;
        });

        var hour = parseInt(parts.hour, 10);
        if (hour === 24) hour = 0;

        var utcTime = Date.UTC(
          parseInt(parts.year, 10),
          parseInt(parts.month, 10) - 1,
          parseInt(parts.day, 10),
          hour,
          parseInt(parts.minute, 10),
          0
        );

        return Math.round((utcTime - date.getTime()) / 60000);
      }

      function formatTime(parts) {
        return pad(parts.hour) + ":" + pad(parts.minute);
      }

      function formatFullDate(parts) {
        return parts.year + "年" + parts.month + "月" + parts.day + "日 · " + parts.weekday;
      }

      function formatShortDate(parts) {
        return parts.month + "月" + parts.day + "日 · " + parts.weekday;
      }

      function formatUtcOffset(minutes) {
        var sign = minutes >= 0 ? "+" : "-";
        var abs = Math.abs(minutes);
        return "UTC" + sign + pad(Math.floor(abs / 60)) + ":" + pad(abs % 60);
      }

      function formatDiff(targetMinutes, localMinutes) {
        var diff = targetMinutes - localMinutes;
        if (diff === 0) return "本地时区";

        var sign = diff > 0 ? "快" : "慢";
        var abs = Math.abs(diff);
        var hours = Math.floor(abs / 60);
        var minutes = abs % 60;

        return minutes === 0 ? sign + hours + "小时" : sign + hours + "小时" + minutes + "分";
      }

      function rotateHands($card, parts) {
        var minuteDeg = parts.minute * 6;
        var hourDeg = ((parts.hour % 12) + parts.minute / 60) * 30;

        $card.find(".hour").css("transform", "translateX(-50%) rotate(" + hourDeg + "deg)");
        $card.find(".minute").css("transform", "translateX(-50%) rotate(" + minuteDeg + "deg)");
      }

      function buildCards() {
        var template = $("#clockTemplate").html();
        var $grid = $("#clockGrid");

        clocks.forEach(function(clock) {
          var $card = $(template);
          $card.attr("data-id", clock.id);
          $card.attr("data-tz", clock.timeZone);
          $card.attr("data-tone", clock.tone);
          $card.find(".city").text(clock.city);
          $card.find(".country").text(clock.country);
          $grid.append($card);
        });
      }

      function tick() {
        var now = new Date();
        var localOffset = getOffsetMinutes(now, localTimeZone);
        var localParts = getParts(now, localTimeZone);

        $("#topTime").text(formatTime(localParts));
        $("#topDate").text(formatFullDate(localParts));

        $(".clock-card").each(function () {
          var $card = $(this);
          var timeZone = $card.attr("data-tz");
          var parts = getParts(now, timeZone);
          var offset = getOffsetMinutes(now, timeZone);

          $card.find(".weekday").text(parts.weekday);
          $card.find(".time").text(formatTime(parts));
          $card.find(".date").text(formatShortDate(parts));
          $card.find(".diff").text(formatUtcOffset(offset) + " · " + formatDiff(offset, localOffset));
          rotateHands($card, parts);
        });
      }

      buildCards();
      tick();
      setInterval(tick, 15000);

      if ("serviceWorker" in navigator && location.protocol === "https:") {
        navigator.serviceWorker.register("./sw.js").catch(function() {});
      }
    });
  </script>
